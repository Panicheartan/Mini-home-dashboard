name: Deploy to NAS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      
      - name: Install dependencies
        working-directory: ./app
        run: npm ci
      
      - name: Build project
        working-directory: ./app
        run: npm run build
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NAS_SSH_KEY }}
          log-public-key: false
      
      - name: Add NAS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 192.168.1.6 >> ~/.ssh/known_hosts
      
      - name: Deploy to NAS
        run: |
          echo "开始部署到 NAS..."
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            app/dist/ \
            admin@192.168.1.6:/share/Public/mini-home/
          echo "部署完成！"
