name: Deploy to NAS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      
      - name: Install dependencies
        working-directory: ./app
        run: npm ci
      
      - name: Build project
        working-directory: ./app
        run: npm run build
      
      - name: Deploy to NAS
        run: |
          echo "开始部署到 NAS..."
          # 直接复制到挂载的目录
          mkdir -p /share/Public/mini-home
          cp -r app/dist/* /share/Public/mini-home/
          chmod -R 755 /share/Public/mini-home
          echo "部署完成！"
